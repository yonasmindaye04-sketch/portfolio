
<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asella Organic — Order Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--G900:#0d1f0f;--G800:#1b3d1e;--G700:#2e7d32;--G600:#388e3c;--G500:#43a047;--G200:#c8e6c9;--G100:#e8f5e9;--G50:#f1f8f1;--ink:#141c15;--ink2:#2d3e2f;--muted:#607d66;--border:#ddeedd;--white:#ffffff;--cream:#f7faf7;--red:#ef4444;--r:10px;--sh:0 2px 16px rgba(46,125,50,.10);--sh2:0 8px 40px rgba(46,125,50,.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--cream);color:var(--ink);font-size:14px;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--G200);border-radius:4px}
#shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
#topbar{display:flex;align-items:center;padding:0 20px;height:54px;background:var(--G800);color:#fff;flex-shrink:0;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.brand{display:flex;align-items:center;gap:8px;font-weight:900;font-size:.98rem;white-space:nowrap}
.brand-ico{width:28px;height:28px;background:var(--G700);border-radius:7px;display:flex;align-items:center;justify-content:center}
.t-acts{display:flex;align-items:center;gap:7px;margin-left:auto}
.t-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;border:1.5px solid rgba(255,255,255,.22);background:transparent;color:#fff;font-size:.77rem;font-weight:700;transition:.14s;white-space:nowrap}
.t-btn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.5)}
.t-btn.grn{background:var(--G600);border-color:var(--G600)}
.t-btn.grn:hover{background:var(--G500)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.25);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,.25)}50%{box-shadow:0 0 0 6px rgba(74,222,128,.08)}}
.spinning{animation:spin .8s linear infinite!important}
@keyframes spin{to{transform:rotate(360deg)}}

/* STAT BAR */
#statbar{display:flex;background:var(--white);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto}
.st{flex:1;min-width:105px;padding:11px 14px;cursor:pointer;border-right:1px solid var(--border);position:relative;transition:background .12s;user-select:none}
.st:last-child{border-right:none}
.st:hover,.st.on{background:var(--G50)}
.st.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--G700)}
.st-lbl{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:3px}
.st-val{font-family:'DM Mono',monospace;font-size:1.45rem;font-weight:500;color:var(--ink)}
.st-dot{width:6px;height:6px;border-radius:50%;margin-top:4px}

/* TOOLBAR */
#toolbar{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto}
.srch-wrap{position:relative;min-width:210px;flex-shrink:0}
.srch-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.78rem;pointer-events:none}
.srch-wrap input{width:100%;padding:8px 9px 8px 28px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);font-size:.8rem;transition:.14s}
.srch-wrap input:focus{outline:none;border-color:var(--G700);background:#fff}
.tb-sel{padding:8px 9px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);font-size:.78rem;font-weight:600;color:var(--ink);min-width:125px;flex-shrink:0}
.tb-sel:focus{outline:none;border-color:var(--G700)}
.tb-date{padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);font-size:.76rem;color:var(--ink);flex-shrink:0}
.tb-date:focus{outline:none;border-color:var(--G700)}
.div1{width:1px;height:26px;background:var(--border);flex-shrink:0}
.clr{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:.75rem;font-weight:700;color:var(--muted);flex-shrink:0;transition:.13s}
.clr:hover{border-color:var(--red);color:var(--red)}
#bulk{display:none;align-items:center;gap:7px;padding:6px 11px;background:#e8f5e9;border:1.5px solid var(--G700);border-radius:8px;font-size:.76rem;font-weight:700;color:var(--G700);flex-shrink:0;white-space:nowrap}
#bulk.show{display:flex}
#bulk select{border:1.5px solid var(--G700);border-radius:6px;padding:4px 7px;font-size:.74rem;background:#fff}
.bka{padding:5px 9px;border-radius:6px;border:none;background:var(--G700);color:#fff;font-size:.72rem;font-weight:800}
.bkc{padding:5px 9px;border-radius:6px;border:none;background:var(--red);color:#fff;font-size:.72rem;font-weight:800}

/* BODY */
#body{display:flex;flex:1;overflow:hidden;min-height:0}

/* TABLE */
#tpane{flex:1;overflow:auto;background:var(--cream)}
.err-b{margin:14px;padding:12px 16px;background:#fee2e2;border:1.5px solid var(--red);border-radius:9px;color:#991b1b;font-size:.8rem;font-weight:600;display:none;align-items:center;gap:8px}
table{width:100%;min-width:840px;border-collapse:collapse;font-size:.81rem}
thead th{position:sticky;top:0;background:var(--white);padding:9px 13px;text-align:left;font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.75px;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;z-index:2}
thead th.srt{cursor:pointer}
thead th.srt:hover{color:var(--G700)}
thead th .si{margin-left:3px;opacity:.3;font-size:.58rem}
thead th.asc .si,thead th.desc .si{opacity:1;color:var(--G700)}
tbody tr{background:#fff;border-bottom:1px solid var(--border);cursor:pointer;transition:background .09s}
tbody tr:hover{background:var(--G50)}
tbody tr.sel{background:#e8f5e9}
tbody tr.fx{animation:fx .5s}
@keyframes fx{0%,100%{background:#fff}50%{background:#c8e6c9}}
td{padding:9px 13px;vertical-align:middle;white-space:nowrap}
td.cc{width:34px;padding:0 10px}
td.ci{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--G700);font-weight:500}
td.ck strong{display:block;font-weight:700;font-size:.81rem}
td.ck span{font-size:.7rem;color:var(--muted)}
td.cm{color:var(--muted);font-size:.74rem;max-width:165px;overflow:hidden;text-overflow:ellipsis}
td.cv{font-family:'DM Mono',monospace;font-weight:600;color:var(--ink2)}
td.cd{font-size:.74rem;color:var(--muted)}
td.ca{text-align:right}
.src-b{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.sb-sa{background:#dbeafe;color:#1e40af}
.sb-od{background:#fce7f3;color:#9d174d}
.sb-fr{background:#ede9fe;color:#5b21b6}
.stb{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.stb::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.sP{background:#fef3c7;color:#92400e}
.sCo{background:#dbeafe;color:#1e40af}
.sPk{background:#ede9fe;color:#5b21b6}
.sT{background:#cffafe;color:#155e75}
.sDe{background:#dcfce7;color:#166534}
.sCa{background:#fee2e2;color:#991b1b}
.sI{background:#ffedd5;color:#9a3412}
.aib{width:27px;height:27px;border-radius:6px;border:1.5px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--muted);margin-left:3px;transition:.12s}
.aib:hover{background:var(--G700);color:#fff;border-color:var(--G700)}
.sk{height:12px;border-radius:4px;background:linear-gradient(90deg,#e8f0e3 25%,#d0e8d0 50%,#e8f0e3 75%);background-size:200%;animation:sk 1.3s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:10px;color:var(--muted)}
.empty i{font-size:2.2rem;opacity:.22}
.empty p{font-size:.86rem}

/* PAGER */
#pager{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:8px 14px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.pg-info{font-size:.74rem;color:var(--muted)}
.pg-info strong{color:var(--ink)}
.pgsz select{border:1.5px solid var(--border);border-radius:6px;padding:4px 7px;font-size:.74rem;background:#fff}
.pgb{display:flex;gap:3px}
.pb{width:29px;height:29px;border-radius:6px;border:1.5px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.74rem;color:var(--ink);transition:.12s}
.pb:hover:not(:disabled){background:var(--G700);color:#fff;border-color:var(--G700)}
.pb:disabled{opacity:.28;cursor:default}
.pb.on{background:var(--G700);color:#fff;border-color:var(--G700);font-weight:800}

/* DRAWER */
#drawer{width:0;background:#fff;border-left:1px solid var(--border);overflow:hidden;transition:width .27s cubic-bezier(.4,0,.2,1);flex-shrink:0;display:flex;flex-direction:column}
#drawer.open{width:420px}
.dr-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 17px;border-bottom:1px solid var(--border);flex-shrink:0;gap:7px}
.dr-hd h3{font-size:.87rem;font-weight:900;color:var(--ink);font-family:'DM Mono',monospace}
.drcl{width:25px;height:25px;border-radius:6px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--muted);transition:.11s}
.drcl:hover{background:#fee2e2;border-color:var(--red);color:var(--red)}
.dr-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.dr-sec{}
.dr-t{font-size:.61rem;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:9px}
.dr-t::after{content:'';flex:1;height:1px;background:var(--border)}
.dr-t i{color:var(--G700)}
.dr-g{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dr-f label{font-size:.61rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:1px}
.dr-f span{font-size:.81rem;color:var(--ink);font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dr-f .mn{font-family:'DM Mono',monospace}
.itb{width:100%;border-collapse:collapse;font-size:.76rem}
.itb th{text-align:left;padding:5px 7px;background:var(--G50);font-size:.61rem;font-weight:800;text-transform:uppercase;letter-spacing:.55px;color:var(--muted)}
.itb td{padding:7px 7px;border-bottom:1px solid var(--border)}
.itb tr:last-child td{border-bottom:none}
.tot{display:flex;justify-content:space-between;padding:9px 11px;background:var(--G50);border-radius:7px;font-weight:800;font-size:.86rem;margin-top:7px}
.tot .am{font-family:'DM Mono',monospace;color:var(--G700)}
/* timeline */
.tl{padding-left:18px;position:relative}
.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border);border-radius:1px}
.tli{position:relative;margin-bottom:12px}
.tld{position:absolute;left:-18px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--G700);border:2px solid #fff;box-shadow:0 0 0 2px var(--G700)}
.tld.dm{background:var(--border);box-shadow:0 0 0 2px var(--border)}
.tla{font-size:.76rem;font-weight:700;color:var(--ink)}
.tlm{font-size:.68rem;color:var(--muted);margin-top:1px}
.tln{font-size:.71rem;color:var(--ink2);margin-top:3px;padding:4px 7px;background:var(--G50);border-radius:5px;border-left:3px solid var(--G500);white-space:pre-wrap}
/* update form */
.upf{display:flex;flex-direction:column;gap:9px}
.upf label{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:3px}
.upf select,.upf textarea{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.8rem;background:var(--cream);color:var(--ink);transition:.13s}
.upf select:focus,.upf textarea:focus{outline:none;border-color:var(--G700);background:#fff}
.upf textarea{resize:vertical;min-height:60px}
.upd-btn{padding:10px;border-radius:8px;border:none;background:var(--G700);color:#fff;font-size:.81rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px;transition:.14s}
.upd-btn:hover:not(:disabled){background:var(--G800)}
.upd-btn:disabled{opacity:.47;cursor:default}
.adv-btn{padding:9px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--ink2);font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.13s}
.adv-btn:hover{background:var(--G50);border-color:var(--G700);color:var(--G700)}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(13,31,15,.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.mc{background:#fff;border-radius:13px;width:92%;max-width:680px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2);animation:mpop .2s ease}
@keyframes mpop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:17px 21px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:2}
.mhd h3{font-size:.93rem;font-weight:900;display:flex;align-items:center;gap:8px}
.mhd h3 i{color:var(--G700)}
.mcl{background:none;border:none;font-size:.95rem;color:var(--muted);cursor:pointer;padding:4px}
.mcl:hover{color:var(--red)}
.mb{padding:20px}
.an-g{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:22px}
.an-c{background:var(--G50);border-radius:9px;padding:13px;text-align:center;border-top:3px solid var(--G700)}
.an-v{font-size:1.45rem;font-weight:900;font-family:'DM Mono',monospace;color:var(--G700);line-height:1.1}
.an-l{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.55px;color:var(--muted);margin-top:3px}
.bs{margin-bottom:20px}
.bs h4{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.75px;color:var(--muted);margin-bottom:11px}
.brow{display:flex;align-items:center;gap:9px;margin-bottom:6px;font-size:.76rem}
.blbl{width:96px;text-align:right;color:var(--muted);font-size:.7rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrk{flex:1;height:19px;background:var(--G50);border-radius:4px;overflow:hidden}
.bfll{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:18px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bfll span{font-size:.63rem;font-weight:800;color:#fff}
.bcnt{width:26px;text-align:left;font-size:.71rem;font-weight:700;color:var(--ink2);font-family:'DM Mono',monospace}
/* trend */
.trow{display:flex;align-items:flex-end;gap:3px;height:56px;margin-bottom:7px}
.tbar{flex:1;border-radius:3px 3px 0 0;min-height:3px;position:relative}
.tbar:hover .ttip{display:block}
.ttip{display:none;position:absolute;bottom:105%;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:4px 7px;border-radius:5px;font-size:.63rem;white-space:nowrap;font-family:'DM Mono',monospace;z-index:5}
.tlbls{display:flex;gap:3px}
.tll{flex:1;font-size:.54rem;color:var(--muted);text-align:center;overflow:hidden}

/* TOASTS */
#toasts{position:fixed;bottom:18px;right:18px;z-index:5000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 15px;border-radius:9px;background:var(--ink);color:#fff;font-size:.78rem;font-weight:700;box-shadow:var(--sh2);animation:tin .22s ease,tout .28s ease forwards;animation-delay:0s,2.4s;max-width:310px;min-width:180px}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(7px)}}
.toast.ok i{color:#86efac}
.toast.er i{color:#fca5a5}
.toast.in i{color:#93c5fd}

@media(max-width:700px){
  #drawer.open{width:100vw;position:fixed;inset:0;z-index:200}
  .an-g{grid-template-columns:1fr 1fr}
  #toolbar{flex-wrap:wrap;gap:6px}
  .srch-wrap{min-width:100%;flex:none}
  .tb-sel,.tb-date{min-width:calc(50% - 5px);flex:1}
  table{font-size:.73rem}
  td{padding:7px 8px}
  thead th{padding:7px 8px;font-size:.58rem}
  .aib{width:24px;height:24px}
  #statbar{overflow-x:auto}
  .st{min-width:85px}
  #topbar{padding:0 12px;gap:6px}
  .t-acts{gap:4px}
  .t-btn{padding:6px 9px;font-size:.7rem}
  .brand{font-size:.88rem}
  .brand-ico{width:22px;height:22px}
  .live-dot+span{display:none}
  #pager{flex-direction:column;align-items:flex-start;gap:6px}
  .pgsz{width:100%;order:1}
  .pgb{width:100%;justify-content:center;order:2}
  .pg-info{order:0}
  .mc{width:97vw;margin:3vw}
  .dr-g{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="shell">

<!-- TOPBAR -->
<header id="topbar">
  <div class="brand">
    <div class="brand-ico"><i class="fas fa-leaf"></i></div>
    Asella — Order Tracking
  </div>
  <div class="live-dot" title="Auto-refreshes every 60s"></div>
  <span style="font-size:.7rem;opacity:.55">Live</span>
  <div class="t-acts">
    <button class="t-btn" onclick="loadOrders(true)"><i class="fas fa-rotate-right" id="ri"></i> Refresh</button>
    <button class="t-btn" onclick="openAnalytics()"><i class="fas fa-chart-bar"></i> Analytics</button>
    <button class="t-btn grn" onclick="doExport()"><i class="fas fa-download"></i> Export CSV</button>
  </div>
</header>

<!-- STAT TILES -->
<div id="statbar">
  <div class="st on" data-s="" onclick="stClick(this,'')"><div class="st-lbl">All Orders</div><div class="st-val" id="s-a">—</div><div class="st-dot" style="background:#94a3b8"></div></div>
  <div class="st" data-s="Pending"    onclick="stClick(this,'Pending')"   ><div class="st-lbl">Pending</div>   <div class="st-val" id="s-p">—</div><div class="st-dot" style="background:#f59e0b"></div></div>
  <div class="st" data-s="Confirmed"  onclick="stClick(this,'Confirmed')" ><div class="st-lbl">Confirmed</div> <div class="st-val" id="s-c">—</div><div class="st-dot" style="background:#3b82f6"></div></div>
  <div class="st" data-s="Packed"     onclick="stClick(this,'Packed')"    ><div class="st-lbl">Packed</div>    <div class="st-val" id="s-pk">—</div><div class="st-dot" style="background:#8b5cf6"></div></div>
  <div class="st" data-s="In Transit" onclick="stClick(this,'In Transit')"><div class="st-lbl">In Transit</div><div class="st-val" id="s-t">—</div><div class="st-dot" style="background:#06b6d4"></div></div>
  <div class="st" data-s="Delivered"  onclick="stClick(this,'Delivered')" ><div class="st-lbl">Delivered</div> <div class="st-val" id="s-d">—</div><div class="st-dot" style="background:#22c55e"></div></div>
  <div class="st" data-s="Issue"      onclick="stClick(this,'Issue')"     ><div class="st-lbl">Issues</div>    <div class="st-val" id="s-i">—</div><div class="st-dot" style="background:#f97316"></div></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="srch-wrap">
    <i class="fas fa-search"></i>
    <input id="srch" type="text" placeholder="Order ID, customer, phone…" oninput="debSrch()">
  </div>
  <select class="tb-sel" id="f-st" onchange="applyF()">
    <option value="">All Statuses</option>
    <option>Pending</option><option>Confirmed</option><option>Packed</option>
    <option>In Transit</option><option>Delivered</option><option>Cancelled</option><option>Issue</option>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
/* ── STATE ── */
let ALL=[],VIEW=[],PAGE=1,PSIZ=20,SCOL='timestamp',SDIR='desc';
let SEL=new Set(),ACT=null,LDNG=false;
const STATS=['Pending','Confirmed','Packed','In Transit','Delivered','Cancelled','Issue'];
const SLBL={Sales_DB:'Sales',Order_DB:'Online',Franchise_DB:'Franchise'};
const SCLS={Sales_DB:'sb-sa',Order_DB:'sb-od',Franchise_DB:'sb-fr'};
const stCls=s=>({Pending:'sP',Confirmed:'sCo',Packed:'sPk','In Transit':'sT',Delivered:'sDe',Cancelled:'sCa',Issue:'sI'}[s]||'sP');
const ST_COL={'Pending':'#f59e0b','Confirmed':'#3b82f6','Packed':'#8b5cf6','In Transit':'#06b6d4','Delivered':'#22c55e','Cancelled':'#ef4444','Issue':'#f97316'};

// Data injected server-side by doGet via HtmlService template
const _SERVER_ORDERS = <?!= INITIAL_ORDERS ?>;
const _SERVER_ERROR  = <?!= JSON.stringify(INITIAL_ERROR) ?>;

// ── gasRun: wraps google.script.run in a Promise ──────────────────────────
// CORS-safe: runs inside GAS sandbox via postMessage bridge (no fetch needed)
// CRITICAL: call r[method]() DIRECTLY — do NOT extract fn=r[method] first,
// as that loses GAS proxy this-binding and causes null responses.
function gasRun(method) {
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      reject(new Error('google.script.run not available'));
      return;
    }
    const gsr = google.script.run;
    if (typeof gsr[method] !== 'function') {
      reject(new Error('GAS method not found: ' + method)); return;
    }
    const r = gsr.withSuccessHandler(function(res) {
      if (res === null || res === undefined) {
        reject(new Error('Server returned empty response — check GAS logs'));
      } else { resolve(res); }
    }).withFailureHandler(reject);
    // Dispatch by arg count (GAS bridge does NOT support .apply())
    const a = args;
    if      (a.length===0) r[method]();
    else if (a.length===1) r[method](a[0]);
    else if (a.length===2) r[method](a[0],a[1]);
    else if (a.length===3) r[method](a[0],a[1],a[2]);
    else if (a.length===4) r[method](a[0],a[1],a[2],a[3]);
    else if (a.length===5) r[method](a[0],a[1],a[2],a[3],a[4]);
    else                   r[method](a[0],a[1],a[2],a[3],a[4],a[5]);
  });
}

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded',()=>{
  if(_SERVER_ERROR){
    showErr('Server error: '+_SERVER_ERROR);
    showEmpty();
  } else {
    ALL = _SERVER_ORDERS || [];
    applyF();
    toast('Loaded '+ALL.length+' orders','ok');
  }
  // Auto-refresh every 60s by reloading the page (preserves template injection approach)
  setInterval(()=>location.reload(), 60000);
});

/* ── LOAD (Refresh button — reloads page to get fresh server data) ── */
function loadOrders(skel,silent){
  if(!silent) toast('Refreshing…','in');
  location.reload();
}

/* ── FILTERS ── */
let _dt2;
function debSrch(){clearTimeout(_dt2);_dt2=setTimeout(applyF,280)}

function stClick(el,s){
  document.querySelectorAll('.st').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('f-st').value=s;
  applyF();
}

function applyF(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const st=document.getElementById('f-st').value;
  const src=document.getElementById('f-src').value;
  const df=document.getElementById('f-df').value;
  const dt=document.getElementById('f-dt').value;

  VIEW=ALL.filter(o=>{
    if(q){const h=[o.orderId,o.customerName,o.phone,o.city].join(' ').toLowerCase();if(!h.includes(q))return false}
    if(st&&o.status!==st)return false;
    if(src&&o.db!==src)return false;
    if(df&&o.timestamp&&new Date(o.timestamp)<new Date(df+'T00:00:00'))return false;
    if(dt&&o.timestamp&&new Date(o.timestamp)>new Date(dt+'T23:59:59'))return false;
    return true;
  });

  VIEW.sort((a,b)=>{
    let va=a[SCOL],vb=b[SCOL];
    if(SCOL==='timestamp'){va=va?new Date(va).getTime():0;vb=vb?new Date(vb).getTime():0}
    else if(SCOL==='total'){va=Number(va)||0;vb=Number(vb)||0}
    else{va=(va||'').toString().toLowerCase();vb=(vb||'').toString().toLowerCase()}
    return SDIR==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  });

  PAGE=1; updStats(); render();
}

function sortBy(col){
  SDIR=SCOL===col?(SDIR==='asc'?'desc':'asc'):(col==='timestamp'||col==='total'?'desc':'asc');
  SCOL=col;
  document.querySelectorAll('thead th.srt').forEach(t=>{t.classList.remove('asc','desc');if(t.dataset.c===col)t.classList.add(SDIR)});
  applyF();
}

function clearF(){
  document.getElementById('srch').value='';
  document.getElementById('f-st').value='';
  document.getElementById('f-src').value='';
  document.getElementById('f-df').value='';
  document.getElementById('f-dt').value='';
  document.querySelectorAll('.st').forEach(t=>t.classList.remove('on'));
  document.querySelector('.st[data-s=""]').classList.add('on');
  applyF();
}

/* ── STATS ── */
function updStats(){
  const c={};STATS.forEach(s=>c[s]=0);
  ALL.forEach(o=>{if(c[o.status]!==undefined)c[o.status]++});
  document.getElementById('s-a').textContent=ALL.length;
  document.getElementById('s-p').textContent=c['Pending'];
  document.getElementById('s-c').textContent=c['Confirmed'];
  document.getElementById('s-pk').textContent=c['Packed'];
  document.getElementById('s-t').textContent=c['In Transit'];
  document.getElementById('s-d').textContent=c['Delivered'];
  document.getElementById('s-i').textContent=c['Issue'];
}

/* ── RENDER TABLE ── */
function render(){
  const tb=document.getElementById('tbody');
  if(VIEW.length===0){showEmpty();updPager();return}
  const sl=VIEW.slice((PAGE-1)*PSIZ,PAGE*PSIZ);
  tb.innerHTML=sl.map(o=>{
    const sum=(o.items||[]).slice(0,2).map(i=>`${ee(i.itemName)} ×${ee(i.quantity)}`).join(', ')
              +((o.items||[]).length>2?` +${(o.items||[]).length-2}`:'');
    const ds=o.timestamp?fmtD(o.timestamp):'—';
    const isel=SEL.has(o.orderId);
    return `<tr data-id="${ee(o.orderId)}" class="${isel?'sel':''}" onclick="rowClk('${ee(o.orderId)}',event)">
      <td class="cc" onclick="event.stopPropagation()"><input type="checkbox" ${isel?'checked':''} onchange="togSel('${ee(o.orderId)}',this)"></td>
      <td class="ci">${ee(o.orderId)}</td>
      <td class="ck"><strong>${ee(o.customerName||'—')}</strong><span>${ee(o.phone||'')}${o.city?' · '+ee(o.city):''}</span></td>
      <td><span class="src-b ${SCLS[o.db]||''}">${SLBL[o.db]||o.db||'—'}</span></td>
      <td class="cd">${ds}</td>
      <td class="cm">${ee(sum||'—')}</td>
      <td class="cv">${fmtE(o.total)}</td>
      <td><span class="stb ${stCls(o.status)}">${ee(o.status||'Pending')}</span></td>
      <td class="ca" onclick="event.stopPropagation()">
        <button class="aib" title="Advance" onclick="quickAdv('${ee(o.orderId)}')"><i class="fas fa-forward-step"></i></button>
        <button class="aib" title="Details" onclick="openDr('${ee(o.orderId)}')"><i class="fas fa-eye"></i></button>
      </td>
    </tr>`;
  }).join('');
  updPager();
}

function rowClk(id,ev){if(ev&&ev.target.closest('.cc'))return;openDr(id)}

function showSkel(){
  document.getElementById('tbody').innerHTML=[1,2,3,4].map(()=>`
    <tr><td></td>
    <td><div class="sk" style="width:120px"></div></td>
    <td><div class="sk" style="width:105px"></div></td>
    <td><div class="sk" style="width:60px"></div></td>
    <td><div class="sk" style="width:78px"></div></td>
    <td><div class="sk" style="width:98px"></div></td>
    <td><div class="sk" style="width:62px"></div></td>
    <td><div class="sk" style="width:72px"></div></td>
    <td></td></tr>`).join('');
}

function showEmpty(){
  document.getElementById('tbody').innerHTML=`<tr><td colspan="9"><div class="empty"><i class="fas fa-inbox"></i><p>No orders match the current filters.</p></div></td></tr>`;
  document.getElementById('pg-info').textContent='No orders';
  document.getElementById('pgb').innerHTML='';
}

/* ── PAGER ── */
function updPager(){
  const tot=VIEW.length,pgs=Math.ceil(tot/PSIZ)||1;
  const s=(PAGE-1)*PSIZ+1,en=Math.min(PAGE*PSIZ,tot);
  document.getElementById('pg-info').innerHTML=tot===0?'No orders':`Showing <strong>${s}–${en}</strong> of <strong>${tot}</strong>`;
  let h=`<button class="pb" onclick="goP(${PAGE-1})" ${PAGE<=1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
  for(let p=1;p<=pgs;p++){
    if(p===1||p===pgs||Math.abs(p-PAGE)<=2)h+=`<button class="pb ${p===PAGE?'on':''}" onclick="goP(${p})">${p}</button>`;
    else if(Math.abs(p-PAGE)===3)h+=`<span style="display:inline-flex;align-items:center;width:26px;justify-content:center;font-size:.8rem;color:var(--muted)">…</span>`;
  }
  h+=`<button class="pb" onclick="goP(${PAGE+1})" ${PAGE>=pgs?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
  document.getElementById('pgb').innerHTML=h;
}
function goP(p){const pgs=Math.ceil(VIEW.length/PSIZ)||1;if(p<1||p>pgs)return;PAGE=p;render();document.getElementById('tpane').scrollTop=0}
function setPsz(n){PSIZ=n;PAGE=1;render()}

/* ── DRAWER ── */
function openDr(id){
  ACT=id;
  const o=ALL.find(x=>x.orderId===id);
  if(!o)return;
  document.getElementById('dr-title').textContent=id;
  document.getElementById('dr-body').innerHTML=buildDr(o);
  document.getElementById('drawer').classList.add('open');
}
function closeDr(){document.getElementById('drawer').classList.remove('open');ACT=null}

function buildDr(o){
  const ds=o.timestamp?new Date(o.timestamp).toLocaleString('en-GB'):'—';
  const us=o.lastUpdate?new Date(o.lastUpdate).toLocaleString('en-GB'):'—';
  const its=(o.items||[]).map(i=>`<tr><td>${ee(i.itemName||'—')}</td><td style="text-align:center;font-weight:700">${ee(String(i.quantity||'—'))}</td><td>${ee(i.packageSize||'—')}</td><td style="font-size:.69rem;color:var(--muted)">${i.deliveryDate?fmtDs(i.deliveryDate):'—'}</td></tr>`).join('');
  const tl=buildTL(o);
  const nxt=nextSt(o.status);
  return `
  <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
    <span class="stb ${stCls(o.status)}" style="font-size:.78rem;padding:6px 13px">${ee(o.status||'Pending')}</span>
    <span style="font-size:.73rem;color:var(--muted)">Source: <strong>${ee(SLBL[o.db]||o.db||'—')}</strong></span>
  </div>
  <div class="dr-sec">
    <div class="dr-t"><i class="fas fa-user"></i> Customer</div>
    <div class="dr-g">
      <div class="dr-f"><label>Name</label><span title="${ee(o.customerName||'')}">${ee(o.customerName||'—')}</span></div>
      <div class="dr-f"><label>Phone</label><span class="mn">${ee(o.phone||'—')}</span></div>
      <div class="dr-f"><label>Location</label><span>${ee(o.location||'—')}</span></div>
      <div class="dr-f"><label>City</label><span>${ee(o.city||'—')}</span></div>
      <div class="dr-f"><label>Order Type</label><span>${ee(o.orderType||'—')}</span></div>
      <div class="dr-f"><label>Logged By</label><span>${ee(o.employeeId||'—')}</span></div>
      <div class="dr-f"><label>Submitted</label><span style="font-size:.73rem">${ds}</span></div>
    </div>
  </div>
  <div class="dr-sec">
    <div class="dr-t"><i class="fas fa-boxes-stacked"></i> Items</div>
    <table class="itb"><thead><tr><th>Item</th><th>Qty</th><th>Package</th><th>Delivery</th></tr></thead><tbody>${its}</tbody></table>
    <div class="tot"><span>Total</span><span class="am">${fmtE(o.total)} ETB</span></div>
  </div>
  <div class="dr-sec">
    <div class="dr-t"><i class="fas fa-clock-rotate-left"></i> Activity</div>
    <div class="tl">${tl}</div>
  </div>
  <div class="dr-sec">
    <div class="dr-t"><i class="fas fa-pen-to-square"></i> Update</div>
    <div class="upf">
      <div><label>New Status</label>
        <select id="u-st">${STATS.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div><label>Note (optional)</label><textarea id="u-nt" placeholder="Add a note…"></textarea></div>
      <button class="upd-btn" id="u-btn" onclick="doUpdate()"><i class="fas fa-check"></i> Save Update</button>
      <button class="adv-btn" onclick="quickAdv('${ee(o.orderId)}',true)"><i class="fas fa-forward-step"></i> Quick Advance → ${ee(nxt)}</button>
    </div>
  </div>
  <div class="dr-sec">
    <div class="dr-t"><i class="fas fa-circle-info"></i> Audit</div>
    <div class="dr-g">
      <div class="dr-f"><label>Updated By</label><span>${ee(o.lastUpdatedBy||'—')}</span></div>
      <div class="dr-f"><label>Last Update</label><span style="font-size:.73rem">${us}</span></div>
    </div>
  </div>
  <div class="dr-sec" style="text-align:center">
    <button onclick="printOrderReceipt('${ee(o.orderId)}')" style="background:#065f46;color:#fff;border:none;padding:10px 22px;border-radius:7px;cursor:pointer;font-size:.88rem;font-weight:600"><i class="fas fa-print"></i> Print Receipt (80mm)</button>
  </div>`;
}

function buildTL(o){
  const it=[];
  if(o.timestamp)it.push({a:'Order placed',m:new Date(o.timestamp).toLocaleString('en-GB'),n:'',act:true});
  if(o.notes){o.notes.split('\n').filter(n=>n.trim()).forEach(n=>{it.push({a:'Note',m:'',n:n,act:false})})}
  if(o.lastUpdate&&o.status){it.push({a:`Status: ${o.status}`,m:new Date(o.lastUpdate).toLocaleString('en-GB')+(o.lastUpdatedBy?' by '+o.lastUpdatedBy:''),n:'',act:true})}
  if(!it.length)return '<p style="font-size:.76rem;color:var(--muted)">No activity yet.</p>';
  return it.map(t=>`<div class="tli"><div class="tld ${t.act?'':'dm'}"></div><div class="tla">${ee(t.a)}</div>${t.m?`<div class="tlm">${ee(t.m)}</div>`:''} ${t.n?`<div class="tln">${ee(t.n)}</div>`:''}</div>`).join('');
}

function nextSt(cur){const i=STATS.indexOf(cur);return STATS[Math.min(i+1,STATS.length-1)]||'Delivered'}

/* ── UPDATE ── */
function doUpdate(){
  if(!ACT)return;
  const nst=document.getElementById('u-st').value;
  const nt=document.getElementById('u-nt').value.trim();
  const btn=document.getElementById('u-btn');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving…';

  gasRun('updateOrderStatus', ACT, nst, nt, window._userId||'staff', {}).then(res=>{
    btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Save Update';
    if(res&&res.success){
      ALL.forEach(o=>{if(o.orderId!==ACT)return;o.status=nst;if(nt)o.notes=(o.notes?o.notes+'\n':'')+nt;o.lastUpdate=new Date().toISOString()});
      applyF(); flashRow(ACT); openDr(ACT); toast('Updated → '+nst,'ok');
    } else toast('Update failed: '+(res&&res.message||'error'),'er');
  }).catch(err=>{btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Update';toast('Error: '+(err.message||err),'er')});
}

function quickAdv(id,fromDr){
  const o=ALL.find(x=>x.orderId===id);if(!o)return;
  const nxt=nextSt(o.status);
  if(nxt===o.status){toast('Already at final status','in');return}
  gasRun('updateOrderStatus', id, nxt, 'Quick advance', window._userId||'staff', {}).then(res=>{
    if(res&&res.success){o.status=nxt;applyF();flashRow(id);toast(id+' → '+nxt,'ok');if(fromDr)openDr(id)}
  }).catch(err=>toast('Error: '+(err.message||err),'er'));
}

/* ── SELECT ── */
function togSel(id,cb){
  if(cb.checked)SEL.add(id);else SEL.delete(id);
  const r=document.querySelector(`tr[data-id="${id}"]`);if(r)r.classList.toggle('sel',cb.checked);
  syncBulk();
}
function togAll(cb){
  const sl=VIEW.slice((PAGE-1)*PSIZ,PAGE*PSIZ);
  sl.forEach(o=>{if(cb.checked)SEL.add(o.orderId);else SEL.delete(o.orderId)});
  render();syncBulk();
}
function clearSel(){SEL.clear();render();syncBulk()}
function syncBulk(){
  document.getElementById('bkc').textContent=SEL.size;
  document.getElementById('bulk').classList.toggle('show',SEL.size>0);
}
function applyBulk(){
  const st=document.getElementById('bks').value;
  if(!st||!SEL.size){toast('Choose a status first','in');return}
  const ids=[...SEL];let done=0;
  ids.forEach(id=>{
    gasRun('updateOrderStatus', id, st, 'Bulk update', window._userId||'staff', {}).then(()=>{
      const o=ALL.find(x=>x.orderId===id);if(o)o.status=st;
      if(++done===ids.length){applyF();clearSel();toast(ids.length+' orders → '+st,'ok')}
    }).catch(()=>{if(++done===ids.length)toast('Some updates failed','er')});
  });
}

/* ── ANALYTICS ── */
function openAnalytics(){
  document.getElementById('an-m').classList.add('open');
  document.getElementById('an-b').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="font-size:1.3rem"></i><p style="margin-top:9px;font-size:.83rem">Loading analytics…</p></div>';
  // FIX-11: getOrderAnalytics returns JSON.stringify — must parse here
  gasRun('getOrderAnalytics').then(raw=>{
    var res; try { res=(typeof raw==='string')?JSON.parse(raw):raw; } catch(e){ res=null; }
    if(res&&res.success) renderAn(res.data||res);
    else document.getElementById('an-b').innerHTML='<p style="color:var(--red);padding:20px">Analytics failed: '+((res&&res.message)||'unknown')+'</p>';
  }).catch(err=>{
    document.getElementById('an-b').innerHTML=`<p style="color:var(--red);padding:20px">Error: ${err.message||err}</p>`;
  });
}
function closeMod(){document.getElementById('an-m').classList.remove('open')}
document.getElementById('an-m').addEventListener('click',function(ev){if(ev.target===this)closeMod()});

function renderAn(d){
  if(!d||!d.totalOrders&&!d.total){
    document.getElementById('an-b').innerHTML='<p style="color:var(--muted);padding:20px">No order data yet.</p>';return;
  }
  const total = d.totalOrders||d.total||0;
  const revenue = d.totalRevenue||d.revenue||0;
  const vendorCost = d.totalVendorCost||0;
  const packCost = d.totalPackagingCost||0;
  const profit = d.grossProfit||(revenue-vendorCost-packCost);
  const avgVal = d.avgOrderValue||d.avgValue||0;
  const statusCount = d.statusCount||d.statusCounts||{};
  const topItems = d.topItems||[];
  const cityCount = d.cityCount||{};
  const revenueByMonth = d.revenueByMonth||{};
  const profitByMonth = d.profitByMonth||{};
  const employeeCount = d.employeeCount||{};
  const genderCount = d.genderCount||{};
  const ageGroupCount = d.ageGroupCount||{};
  const stockMovement = d.stockMovement||{};

  function fmtE(v){const n=Number(v);return isNaN(n)?'—':n.toLocaleString('en-US');}
  function barRows(obj,color,currency){
    const keys=Object.keys(obj);if(!keys.length)return '<p style="color:var(--muted);font-size:.78rem">No data yet</p>';
    const max=Math.max(...keys.map(k=>obj[k]),1);
    return keys.sort((a,b)=>obj[b]-obj[a]).slice(0,10).map(k=>{
      const pct=(obj[k]/max*100).toFixed(1);
      const lbl=k.length>14?k.slice(0,13)+'…':k;
      const val=currency?fmtE(obj[k])+' ETB':obj[k];
      return `<div class="brow"><span class="blbl" title="${k}">${lbl}</span><div class="btrk"><div class="bfll" style="width:${pct}%;background:${color||'var(--G600)'}"><span></span></div></div><span class="bcnt">${val}</span></div>`;
    }).join('');
  }
  const stBar=STATS.map(s=>{const c=statusCount[s]||0;const pct=total?(c/total*100).toFixed(1):0;return `<div class="brow"><span class="blbl">${s}</span><div class="btrk"><div class="bfll" style="width:${pct}%;background:${ST_COL[s]||'#94a3b8'}"><span></span></div></div><span class="bcnt">${c}</span></div>`;}).join('');

  document.getElementById('an-b').innerHTML=`
  <div class="an-g">
    <div class="an-c"><div class="an-v">${total}</div><div class="an-l">Total Orders</div></div>
    <div class="an-c"><div class="an-v">${fmtE(revenue)}</div><div class="an-l">Revenue (ETB)</div></div>
    <div class="an-c"><div class="an-v">${fmtE(vendorCost+packCost)}</div><div class="an-l">Total Costs (ETB)</div></div>
    <div class="an-c"><div class="an-v">${fmtE(profit)}</div><div class="an-l">Net Profit (ETB)</div></div>
    <div class="an-c"><div class="an-v">${fmtE(avgVal)}</div><div class="an-l">Avg Order Value</div></div>
    <div class="an-c"><div class="an-v">${statusCount['Pending']||0}</div><div class="an-l">Pending Orders</div></div>
  </div>
  <div class="bs"><h4>📊 By Status</h4>${stBar}</div>
  <div class="bs"><h4>💰 Revenue by Month (ETB)</h4>${barRows(revenueByMonth,'#2e7d32',true)}</div>
  <div class="bs"><h4>📈 Net Profit by Month (ETB)</h4>${barRows(profitByMonth,'#43a047',true)}</div>
  <div class="bs"><h4>🏆 Top Products Sold</h4>${barRows(Object.fromEntries(topItems.map(i=>[i.name,i.count])),'#388e3c',false)}</div>
  <div class="bs"><h4>👥 Orders by Employee</h4>${barRows(employeeCount,'#66bb6a',false)}</div>
  <div class="bs"><h4>⚧ Gender Breakdown</h4>${barRows(genderCount,'#81c784',false)}</div>
  <div class="bs"><h4>📅 Age Groups</h4>${barRows(ageGroupCount,'#a5d6a7',false)}</div>
  <div class="bs"><h4>📍 Top Cities</h4>${barRows(cityCount,'#388e3c',false)}</div>
  <div class="bs"><h4>📦 Packaging Events (Stock Movement)</h4>${barRows(stockMovement,'#c8e6c9',false)}</div>`;
}

/* ── EXPORT ── */
function doExport(){
  toast('Generating CSV…','in');

    if(res&&res.url){toast('CSV ready — opening…','ok');window.open(res.url,'_blank');}

/* ── Price map for receipt (mirrors Index.html PRICE_MAP) ── */
const TRACKING_PRICE_MAP={
  'Kerbe Powder':{'100 g':800},'Kerbe Raw':{'100 g':800},
  'Ashwagandha Powder':{'100 g':1000,'220 g':2000,'250 g':2500},
  'Ashwagandha Tablet (Himalayan)':{'60 capsules':2500,'120 capsules':4500},
  'Chebe Powder':{'100 g':1000},'Chia Seed':{'250 g':800,'1 kg':3000},
  'Cinnamon':{'100 g':600},'Coffee Bean':{'500 g':800},
  'Turmeric Powder':{'200 g':450},'Hibiscus Dry Leaf':{'100 g':500,'200 g':1000},
  'Qasil Powder':{'200 g':450},
  'Moringa Powder':{'100 g':250,'200 g':350,'500 g':750,'1 kg':1100},
  'Moringa Seed':{'200 g':450,'500 g':1000},
  'Shilajit Capsules':{'60 capsules':4500},
  'Shilajit Gummies':{'30 gummies':4000,'60 gummies':4000},
  'Himalayan Shilajit Jell':{'1 jar (20g)':5000}
};
function lookupPrice(name,pkg){
  if(!name||!pkg)return 0;
  const m=TRACKING_PRICE_MAP[name];
  if(m&&m[pkg]!==undefined)return m[pkg];
  // fuzzy: try lowercase match
  const kl=Object.keys(TRACKING_PRICE_MAP).find(k=>k.toLowerCase()===name.toLowerCase());
  if(kl){const m2=TRACKING_PRICE_MAP[kl];if(m2&&m2[pkg]!==undefined)return m2[pkg];}
  return 0;
}

/* ── PRINT RECEIPT (80mm Thermal) ── */
function printOrderReceipt(id){
  const o=ALL.find(x=>x.orderId===id);
  if(!o){toast('Order not found','er');return;}
  const RECEIPT_TIN='0093291109';
  const RECEIPT_WEBAPP_URL='https://script.google.com/macros/s/AKfycbwWd0BlznAEODLgtSMDu3J6vGKhgOWXcSvpK4cAIYgiApSeS5IMVePiLJkVzbrs7CsomA/exec';
  const BIZ={name:'Asella Organic Enterprise',address:'Addis Ababa, Piazza Giorgis, Ethel Appartment',phone:'+251 909 122 623',website:'asella-organic.com'};
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const items=o.items||[];
  const isFranchise=(o.db||'').indexOf('Franchise')>-1;

  // Calculate real prices per item from PRICE_MAP
  let calcTotal=0;
  const itemRows=items.map(i=>{
    const up=lookupPrice(i.itemName,i.packageSize);
    const amt=up*(parseInt(i.quantity)||1);
    calcTotal+=amt;
    if(isFranchise){
      return '<tr><td class="td-desc">'+(i.itemName||'—')+(i.packageSize?' ('+i.packageSize+')':'')+'</td>'
            +'<td class="c">'+(i.quantity||1)+'</td></tr>';
    }
    return '<tr><td class="td-desc">'+(i.itemName||'—')+(i.packageSize?' ('+i.packageSize+')':'')+'</td>'
          +'<td class="c">'+(i.quantity||1)+'</td>'
          +'<td class="r">'+(up?fmtE(up):'—')+'</td>'
          +'<td class="r"><b>'+(amt?fmtE(amt):'—')+'</b></td></tr>';
  }).join('');

  const displayTotal=o.total&&o.total>0?o.total:calcTotal;
  const footerRows=isFranchise?'':
    '<tr><td colspan="3" style="padding-top:3px">TXBL1</td><td class="r" style="padding-top:3px">'+fmtE(displayTotal)+'</td></tr>'+
    '<tr class="tot-line"><td colspan="3"><b>TOTAL</b></td><td class="r"><b>'+fmtE(displayTotal)+'</b></td></tr>'+
    '<tr><td colspan="3">CASH</td><td class="r">'+fmtE(displayTotal)+'</td></tr>'+
    '<tr><td colspan="3">ITEM#</td><td class="r">'+items.length+'</td></tr>';
  const hdrCols=isFranchise
    ?'<th>Description</th><th class="c">Qty</th>'
    :'<th>Description</th><th class="c">Qty</th><th class="r">Price</th><th class="r">Amount</th>';

  const qrContent=RECEIPT_WEBAPP_URL?RECEIPT_WEBAPP_URL+'?orderId='+encodeURIComponent(o.orderId||'')+'&customer='+encodeURIComponent(o.customerName||''):'Asella Organic | Order: '+(o.orderId||'—')+' | TIN: '+RECEIPT_TIN;
  const locationLine=(o.city||'')+(o.country?', '+o.country:'');
  const w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Receipt '+ee(o.orderId||'')+'</title>');
  w.document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>');
  w.document.write('<style>');
  w.document.write('@page{size:80mm auto;margin:0 2mm}');
  w.document.write('*{margin:0;padding:0;box-sizing:border-box}');
  w.document.write('body{font-family:"Courier New",Courier,monospace;font-size:13px;color:#000;width:72mm;padding:3mm 2mm 4mm}');
  w.document.write('.biz-name{font-size:16px;font-weight:bold;text-align:center;margin-bottom:3px;letter-spacing:.5px}');
  w.document.write('.biz-tin{font-size:13px;font-weight:bold;text-align:center;margin-bottom:2px}');
  w.document.write('.biz-sub{font-size:11px;text-align:center;color:#111;margin-bottom:2px}');
  w.document.write('.divider{border:none;border-top:1px dashed #000;margin:5px 0}');
  w.document.write('.divider2{border:none;border-top:2px solid #000;margin:5px 0}');
  w.document.write('.invoice-lbl{text-align:center;font-weight:bold;font-size:13px;letter-spacing:2px;padding:4px 0;margin:4px 0;border-top:1px solid #000;border-bottom:1px solid #000}');
  w.document.write('table{width:100%;border-collapse:collapse}');
  w.document.write('th{text-align:left;border-bottom:1px solid #000;padding:3px 1px;font-size:12px;text-transform:uppercase;font-weight:bold}');
  w.document.write('td{padding:3px 1px;vertical-align:top;word-break:break-word;font-size:12px}');
  w.document.write('.td-desc{max-width:100px}');
  w.document.write('.c{text-align:center;width:20px}');
  w.document.write('.r{text-align:right;min-width:44px}');
  w.document.write('.tot-line td{border-top:1px dashed #000;font-weight:bold;font-size:14px;padding-top:3px}');
  w.document.write('.info-row{display:flex;justify-content:space-between;margin:2.5px 0;font-size:12px;gap:4px}');
  w.document.write('.lbl{font-weight:bold;white-space:nowrap}.val{text-align:right;word-break:break-word}');
  w.document.write('.footer{text-align:center;font-size:11px;margin-top:6px;color:#111}');
  w.document.write('.validity{text-align:center;font-size:10px;font-style:italic;margin:5px 2px;padding:4px;border:1px solid #000}');
  w.document.write('#qrcode{text-align:center;margin:8px auto 3px}');
  w.document.write('#qrcode canvas,#qrcode img{display:block;margin:0 auto}');
  w.document.write('.scan-lbl{text-align:center;font-size:11px;margin-top:3px}');
  w.document.write('.noprint{display:block;text-align:center;margin:14px 0}');
  w.document.write('@media print{.noprint{display:none}body{width:72mm;padding:2mm 1mm 3mm}}');
  w.document.write('</style></head><body>');
  // ── Header ──
  w.document.write('<div class="biz-name">'+BIZ.name+'</div>');
  w.document.write('<div class="biz-tin">TIN: '+RECEIPT_TIN+'</div>');
  w.document.write('<div class="biz-sub">'+BIZ.address+'</div>');
  w.document.write('<div class="biz-sub">Tel: '+BIZ.phone+' / +251 942 223 999</div>');
  w.document.write('<div class="biz-sub">DATE: '+dateStr+'</div>');
  w.document.write('<div class="divider2"></div>');
  w.document.write('<div class="invoice-lbl">══ CASH INVOICE ══</div>');
  const fields=[['Order ID',o.orderId||''],['Customer',o.customerName||''],['Phone',o.phone||''],
    ['Location',locationLine||o.location||''],['Order Type',o.orderType||''],['Operator',o.employeeId||'']];
  fields.forEach(function(row){
    if(!row[1])return;
    w.document.write('<div class="info-row"><span class="lbl">'+row[0]+'</span><span class="val">'+ee(row[1])+'</span></div>');
  });
  w.document.write('<div class="divider"></div>');
  w.document.write('<table><thead><tr>'+hdrCols+'</tr></thead>');
  w.document.write('<tbody>'+itemRows+'</tbody>');
  if(!isFranchise)w.document.write('<tfoot>'+footerRows+'</tfoot>');
  w.document.write('</table>');
  w.document.write('<div class="divider2"></div>');
  // ── Large QR ──
  w.document.write('<div id="qrcode"></div>');
  w.document.write('<div class="scan-lbl">Scan to view receipt online</div>');
  w.document.write('<div class="divider"></div>');
  w.document.write('<div class="validity">This receipt is valid only for Asella Organic orders.</div>');
  w.document.write('<div class="footer"><div>Thank you for your order!</div><div>'+BIZ.website+'</div></div>');
  w.document.write('<div class="noprint">');
  w.document.write('<button onclick="window.print()" style="padding:10px 26px;background:#065f46;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:14px;margin-right:8px">🖨 Print (80mm)</button>');
  w.document.write('<button onclick="window.close()" style="padding:10px 18px;background:#e2e8f0;color:#2d3748;border:none;border-radius:7px;cursor:pointer;font-size:14px">Close</button>');
  w.document.write('</div></body></html>');
  w.document.close();
  w.onload=function(){
    try{
      new w.QRCode(w.document.getElementById('qrcode'),{text:qrContent,width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:w.QRCode.CorrectLevel.M});
    }catch(qe){w.document.getElementById('qrcode').innerHTML='<div style="font-size:10px;color:#666;text-align:center">[QR: '+o.orderId+']</div>';}
    setTimeout(function(){try{w.print();}catch(pe){}},900);
  };
}

/* ── HELPERS ── */
function ee(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtE(v){const n=Number(v);return isNaN(n)?'—':n.toLocaleString('en-US')}
function fmtD(iso){try{const d=new Date(iso);return isNaN(d)?iso:d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}catch(e){return iso}}
function fmtDs(iso){try{const d=new Date(iso);return isNaN(d)?iso:d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}catch(e){return iso}}
function flashRow(id){const r=document.querySelector(`tr[data-id="${id}"]`);if(!r)return;r.classList.add('fx');setTimeout(()=>r.classList.remove('fx'),600)}
function toast(msg,type){
  const el=document.createElement('div');el.className=`toast ${type||'in'}`;
  const ic={ok:'fa-circle-check',er:'fa-circle-xmark',in:'fa-circle-info'};
  el.innerHTML=`<i class="fas ${ic[type]||ic.in}"></i> ${ee(msg)}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
function showErr(msg){const b=document.getElementById('err');document.getElementById('err-txt').textContent=msg;b.style.display='flex'}
function hideErr(){document.getElementById('err').style.display='none'}
